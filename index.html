<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

  <style>
    body { margin: 0; font-family: sans-serif; }

    #toolbar {
      display: flex;
      gap: 10px;
      padding: 10px;
      align-items: center;
    }

    #calendar {
      max-width: 100%;
      margin: 0 10px 10px 10px;
      position: relative;
      z-index: 1;
    }

    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #modalContent {
      background: white;
      padding: 20px;
      border-radius: 8px;
      min-width: 300px;
    }

    select, button {
      padding: 6px;
    }

    #dayEntries {
      margin-top: 15px;
      border-top: 1px solid #ddd;
      padding-top: 10px;
    }
  </style>
</head>

<body>

<div id="toolbar">
  <label>Employee:</label>
  <select id="filterEmployee" onchange="applyFilter()"></select>
  <button onclick="resetFilter()">All</button>
</div>

<div id="calendar"></div>

<div id="modal">
  <div id="modalContent">
    <div id="selectedDate"></div>

    <select id="employeeSelect"></select>
    <select id="departmentSelect"></select>

    <button onclick="saveShift()">Save</button>
    <button onclick="closeModal()">Cancel</button>

    <div id="dayEntries"></div>
  </div>
</div>

<script>
grist.ready({ allowSelectBy: true });

let calendar;
let selectedDate = null;

let employees = [];
let departments = [];
let allRecords = [];
let currentFilter = null;

/* -------------------- INIT -------------------- */

init();

async function init() {
  await loadData();
  setupUI();
}

/* -------------------- LOAD -------------------- */

async function loadData() {
  const empTable = await grist.docApi.fetchTable("Employees");
  const depTable = await grist.docApi.fetchTable("Departments");

  employees = empTable.employee || empTable.name || [];
  departments = depTable.department || depTable.name || [];
}

/* -------------------- UI -------------------- */

function setupUI() {
  fillDropdowns();
  fillFilter();
}

/* -------------------- DROPDOWNS -------------------- */

function fillDropdowns() {
  document.getElementById("employeeSelect").innerHTML =
    employees.map(e => `<option value="${e}">${e}</option>`).join("");

  document.getElementById("departmentSelect").innerHTML =
    departments.map(d => `<option value="${d}">${d}</option>`).join("");
}

function fillFilter() {
  const f = document.getElementById("filterEmployee");

  f.innerHTML =
    `<option value="">All employees</option>` +
    employees.map(e => `<option value="${e}">${e}</option>`).join("");
}

/* -------------------- CALENDAR -------------------- */

function toEvents(records) {
  return records.map(r => ({
    id: String(r.id),
    title: `${r.employee} / ${r.department}`,
    start: r.date,
    allDay: true
  }));
}

function initCalendar(events) {
  const el = document.getElementById("calendar");

  calendar = new FullCalendar.Calendar(el, {
    initialView: "dayGridMonth",
    editable: true,
    selectable: true,
    events: events,

    eventDrop: async (info) => {
      await grist.docApi.applyUserActions([
        ["UpdateRecord", "Shifts_TEST", Number(info.event.id), {
          date: info.event.startStr
        }]
      ]);
    },

    dateClick: (info) => {
      selectedDate = info.dateStr;
      openModal(info.dateStr);
    }
  });

  calendar.render();
}

/* -------------------- FILTER -------------------- */

function applyFilter() {
  const value = document.getElementById("filterEmployee").value;
  currentFilter = value || null;

  const filtered = currentFilter
    ? allRecords.filter(r => r.employee === currentFilter)
    : allRecords;

  calendar.removeAllEvents();
  calendar.addEventSource(toEvents(filtered));
}

function resetFilter() {
  document.getElementById("filterEmployee").value = "";
  currentFilter = null;

  calendar.removeAllEvents();
  calendar.addEventSource(toEvents(allRecords));
}

/* -------------------- MODAL -------------------- */

function openModal(dateStr) {
  document.getElementById("selectedDate").innerText = "Date: " + dateStr;
  document.getElementById("modal").style.display = "flex";

  loadDayEntries(dateStr);
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

/* -------------------- SAVE -------------------- */

async function saveShift() {
  const employee = document.getElementById("employeeSelect").value;
  const department = document.getElementById("departmentSelect").value;

  await grist.docApi.applyUserActions([
    ["AddRecord", "Shifts_TEST", null, {
      employee,
      department,
      date: selectedDate
    }]
  ]);

  closeModal();
}

/* -------------------- DAY VIEW (FIXED) -------------------- */

function sameDay(a, b) {
  if (!a) return false;
  const d = new Date(a);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}` === b;
}

function loadDayEntries(dateStr) {
  const filtered = allRecords.filter(r =>
    sameDay(r.date, dateStr)
  );

  const container = document.getElementById("dayEntries");

  if (!filtered.length) {
    container.innerHTML = "<b>No shifts for this day</b>";
    return;
  }

  container.innerHTML = `
    <b>Shifts:</b>
    <ul>
      ${filtered.map(r => `<li>${r.employee} / ${r.department}</li>`).join("")}
    </ul>
  `;
}

/* -------------------- SYNC -------------------- */

grist.onRecords(records => {
  allRecords = records;

  const events = toEvents(records);

  if (!calendar) {
    initCalendar(events);
  } else {
    calendar.removeAllEvents();
    calendar.addEventSource(
      currentFilter
        ? toEvents(records.filter(r => r.employee === currentFilter))
        : events
    );
  }
});
</script>

</body>
</html>

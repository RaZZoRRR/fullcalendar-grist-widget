<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

  <style>
    body { margin:0; font-family: sans-serif; }
    #calendar { max-width: 100%; margin: 10px; }
  </style>
</head>

<body>
  <div id="calendar"></div>

  <script>
    grist.ready({ allowSelectBy: true });

    let calendar;

    function toEvents(records) {
      return records.map(r => ({
        id: String(r.id),
        title: r.title || "Shift",
        start: r.start,
        end: r.end,
        backgroundColor: r.color || "#3b82f6",
      }));
    }

    function initCalendar(events) {
      const el = document.getElementById("calendar");

      calendar = new FullCalendar.Calendar(el, {
        initialView: "timeGridWeek",
        editable: true,
        selectable: true,
        events: events,

        eventDrop: async (info) => {
          await updateEvent(info.event);
        },

        eventResize: async (info) => {
          await updateEvent(info.event);
        },

        dateClick: async (info) => {
          const newShift = {
            title: "New shift",
            start: info.dateStr,
            end: info.dateStr
          };

          await grist.setCursorPos({ rowId: "new" });
        }
      });

      calendar.render();
    }

    async function updateEvent(event) {
      const rowId = Number(event.id);

      await grist.docApi.applyUserActions([
        ["UpdateRecord", "Shifts", rowId, {
          start: event.start.toISOString(),
          end: event.end?.toISOString()
        }]
      ]);
    }

    grist.onRecords(records => {
      const events = toEvents(records);
      if (!calendar) {
        initCalendar(events);
      } else {
        calendar.removeAllEvents();
        calendar.addEventSource(events);
      }
    });
  </script>
</body>
</html>
